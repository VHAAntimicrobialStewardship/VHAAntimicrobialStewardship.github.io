// For brevity in this copy, reuse the same logic by fetching the OM/OD data set above.

// Fetch OMJSON Data
async function fetchOMData() {
    const response = await fetch(OMjson);
    const data = await response.json();
    return data;
}

// Fetch ODJSON Data
async function fetchODData() {
    const response = await fetch(ODjson);
    const data = await response.json();
    return data;
}

// Fetch AbxLink Data
async function fetchAbxLink() {
    const response = await fetch(AbxLinkjson);
    const data = await response.json();
    return data;
}

// Minimal initialization to make this copy usable: populate dropdown and set page title
Promise.all([fetchOMData(), fetchODData(), fetchAbxLink()])
  .then(([omjsonData, odjsonData, abxlinkjsonData]) => {
    // Basic initialization used by the full app
    document.getElementById('versionTag').textContent = Version;
    document.getElementById('pageTitle').textContent = Title;
    document.getElementById('mainMenuButton').textContent = MainMenuButton;
    // No further UI wiring in this lightweight copy; it will reuse the Minneapolis data.
  })
  .catch(error => {
    console.error('Error initializing TestStation:', error);
  });
