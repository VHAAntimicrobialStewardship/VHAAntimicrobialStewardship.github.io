backend:
  name: github
  repo: VHAASP/VHAASP.github.io
  branch: main
  # When the OAuth service is ready, point Decap at it here.
  # auth_endpoint: https://YOUR-OAUTH-SERVICE/auth
  # base_url: https://YOUR-OAUTH-SERVICE

local_backend:
  url: http://localhost:8081/api/v1
  allowed_hosts:
    - localhost
    - 127.0.0.1

publish_mode: simple
site_url: https://vhaasp.github.io/
display_url: https://vhaasp.github.io/
media_folder: "assets/uploads"
public_folder: "/assets/uploads"
editor:
  preview: false

collections:
  - label: "CDSS Data"
    name: "cdss_data"
    files:
      - label: "Antibiotic Links"
        name: "abx_links"
        file: "cms-data/abx-links.cms.json"
        format: "json"
        extension: "json"
        fields:
          - label: "Entries"
            name: "entries"
            widget: list
            summary: "{{fields.Name}}"
            fields:
              - { label: "Name", name: "Name", widget: "string" }
              - { label: "URL", name: "URL", widget: "string" }
              - { label: "Route Filter", name: "RouteFilter", widget: "string", required: false }
      - label: "Test Station Menus"
        name: "test_station_menus"
        file: "cms-data/teststation-om.cms.json"
        format: "json"
        extension: "json"
        fields:
          - label: "Menus"
            name: "menus"
            widget: list
            summary: "{{fields.Name}}"
            fields:
              - { label: "Name", name: "Name", widget: "string" }
              - { label: "Display Text", name: "DisplayText", widget: "string", required: false }
              - { label: "Version", name: "Version", widget: "string", required: false }
              - label: "Contents"
                name: "Contents"
                widget: list
                required: false
                summary: "R{{fields.Row}} C{{fields.Column}}"
                fields:
                  - { label: "Row", name: "Row", widget: "number", value_type: "int", required: false }
                  - { label: "Column", name: "Column", widget: "number", value_type: "int", required: false }
                  - { label: "Text", name: "Text", widget: "string", required: false }
                  - { label: "Item", name: "Item", widget: "string", required: false }
                  - { label: "Display Text", name: "DisplayText", widget: "string", required: false }
                  - { label: "Mnemonic", name: "Mnemonic", widget: "string", required: false }
                  - { label: "Header", name: "Header", widget: "number", value_type: "int", required: false }
  - label: "Site Settings"
    name: "site_settings"
    files:
      - label: "Web Manifest"
        name: "web_manifest"
        file: "manifest.webmanifest"
        format: "json"
        extension: "json"
        identifier_field: name
        summary: "{{name}}"
        fields:
          - {label: "Name", name: "name", widget: "string"}
          - {label: "Short Name", name: "short_name", widget: "string"}
          - {label: "Description", name: "description", widget: "string", required: false}
          - {label: "Scope", name: "scope", widget: "string"}
          - {label: "Start URL", name: "start_url", widget: "string"}
          - {label: "Background Color", name: "background_color", widget: "string"}
          - {label: "Theme Color", name: "theme_color", widget: "string"}
          - {label: "Display", name: "display", widget: "string"}
          - label: "Icons"
            name: "icons"
            widget: list
            fields:
              - {label: "Src", name: "src", widget: "string"}
              - {label: "Sizes", name: "sizes", widget: "string"}
              - {label: "Type", name: "type", widget: "string"}
              - {label: "Purpose", name: "purpose", widget: "string", required: false}
